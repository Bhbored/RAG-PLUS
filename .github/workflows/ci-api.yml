name: CI - API & Processor

on:
  push:
    paths:
      - 'src/Api/**'
      - 'src/Processor/**'
  pull_request:
    paths:
      - 'src/Api/**'
      - 'src/Processor/**'

jobs:
  api-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Format check
        run: dotnet format Api.csproj --verify-no-changes --verbosity diagnostic || true

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal || echo "No test projects found"

      - name: Build Docker image
        working-directory: ${{ github.workspace }}
        run: |
          docker build \
            -t ragplus-api:${{ github.sha }} \
            -f src/Api/Dockerfile \
            src/Api/

  processor-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Processor

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Format check
        run: dotnet format Processor.csproj --verify-no-changes --verbosity diagnostic || true

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal || echo "No test projects found"

      - name: Build Docker image
        working-directory: ${{ github.workspace }}
        run: |
          docker build \
            -t ragplus-processor:${{ github.sha }} \
            -f docker/Dockerfile.processor \
            .

name: CI - Scraper

on:
  push:
    paths:
      - 'src/Scraper/**'
  pull_request:
    paths:
      - 'src/Scraper/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Scraper

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build Docker image
        run: |
          docker build -t ragplus-scraper:${{ github.sha }} \
            -f ../../docker/Dockerfile.scraper .
